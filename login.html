<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twerk | Login</title>
    <style>
        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #ffffff 0%, #e6f5ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Floating Animation Elements */
        .floating-icon {
            position: absolute;
            opacity: 0.1;
            animation: float 15s infinite ease-in-out;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }
        
        /* Position the floating icons */
        .icon-1 {
            top: 10%;
            left: 5%;
            animation-delay: 0s;
            animation-duration: 18s;
        }
        
        .icon-2 {
            top: 70%;
            left: 10%;
            animation-delay: 2s;
            animation-duration: 14s;
        }
        
        .icon-3 {
            top: 20%;
            right: 8%;
            animation-delay: 3s;
        }
        
        .icon-4 {
            bottom: 15%;
            right: 12%;
            animation-delay: 4s;
            animation-duration: 16s;
        }
        
        /* Login Container */
        .login-container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 120, 200, 0.1);
            width: 90%;
            max-width: 420px;
            padding: 40px;
            position: relative;
            z-index: 10;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .login-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 120, 200, 0.15);
        }
        
        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 30px;
            color: #00aced;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            position: relative;
        }
        
        .logo::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background: #00aced;
            margin: 10px auto 0;
            animation: widthGrow 1.5s ease-in-out infinite alternate;
        }
        
        @keyframes widthGrow {
            0% {
                width: 30px;
                opacity: 0.7;
            }
            100% {
                width: 70px;
                opacity: 1;
            }
        }
        
        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 0.95rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: rgba(230, 245, 255, 0.3);
        }
        
        .form-group input:focus {
            border-color: #00aced;
            box-shadow: 0 0 0 3px rgba(0, 172, 237, 0.2);
            outline: none;
        }
        
        .form-group input:hover {
            background-color: rgba(230, 245, 255, 0.5);
        }
        
        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: #00aced;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .submit-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255, 255, 255, 0.3) 0%,
                rgba(255, 255, 255, 0) 50%
            );
            transform: rotate(45deg);
            transition: all 0.5s ease;
        }
        
        .submit-btn:hover {
            background-color: #009ad8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 154, 216, 0.3);
        }
        
        .submit-btn:hover::before {
            animation: shine 1.5s ease-in-out infinite;
        }
        
        @keyframes shine {
            0% {
                left: -100%;
            }
            100% {
                left: 100%;
            }
        }
        
        /* Footer Links */
        .footer-links {
            margin-top: 25px;
            text-align: center;
            font-size: 0.9rem;
        }
        
        .footer-links a {
            color: #00aced;
            text-decoration: none;
            font-weight: 500;
            margin: 0 10px;
            position: relative;
        }
        
        .footer-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background-color: #00aced;
            transition: width 0.3s ease;
        }
        
        .footer-links a:hover::after {
            width: 100%;
        }
        
        /* Responsive Adjustments */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            .logo {
                font-size: 2rem;
            }
            
            .form-group input {
                padding: 12px;
            }
            
            .submit-btn {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Animation Icons -->
    <div class="floating-icon icon-1">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8.29 20.251c7.547 0 11.675-6.253 11.675-11.675 0-.178 0-.355-.012-.53A8.348 8.348 0 0022 5.92a8.19 8.19 0 01-2.357.646 4.118 4.118 0 001.804-2.27 8.224 8.224 0 01-2.605.996 4.107 4.107 0 00-6.993 3.743 11.65 11.65 0 01-8.457-4.287 4.106 4.106 0 001.27 5.477A4.072 4.072 0 012.8 9.713v.052a4.105 4.105 0 003.292 4.022 4.095 4.095 0 01-1.853.07 4.108 4.108 0 003.834 2.85A8.233 8.233 0 012 18.407a11.616 11.616 0 006.29 1.84" fill="#00aced"/>
        </svg>
    </div>
    
    <div class="floating-icon icon-2">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z" fill="#00aced"/>
        </svg>
    </div>
    
    <div class="floating-icon icon-3">
        <svg width="50" height="50" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 21.638h-.014C9.403 21.59 1.95 14.856 1.95 8.478c0-3.064 2.525-5.754 5.403-5.754 2.29 0 3.83 1.58 4.646 2.73.814-1.148 2.354-2.73 4.645-2.73 2.88 0 5.404 2.69 5.404 5.755 0 6.376-7.454 13.11-10.037 13.157H12z" fill="#00aced"/>
        </svg>
    </div>
    
    <div class="floating-icon icon-4">
        <svg width="70" height="70" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2.59l3.535 3.536-1.414 1.414L12 5.418l-2.121 2.122-1.414-1.414L12 2.59zM5.417 12l-2.122-2.121L12 2.59l3.536 3.536-2.122 2.12L12 7.653l-6.583 6.583 1.414 1.414L12 10.48l2.121 2.122 1.414-1.414L12 7.653l6.583 6.583-2.121 2.122L12 16.347l2.121 2.121 1.415-1.414L12 16.346l2.122-2.121 3.535 3.535L12 21.41l-8.607-8.607-2.122-2.122L12 5.418l2.121 2.122 1.415-1.414L12 2.59 5.417 12zM12 16.347l-6.583 6.582 1.414 1.415L12 19.176l2.121 2.122 1.414-1.415L12 16.347z" fill="#00aced"/>
        </svg>
    </div>
    
    <!-- Login Container -->
    <div class="login-container">
        <h1 class="logo">Twerk</h1>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="submit-btn">Log In</button>
        </form>
    
    </div>
    
    <script>
        // Form submission handling
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form values
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // For demo purposes, just show an alert
            alert(`Login attempted with:\nUsername: ${username}\nPassword: ${password}`);
            
            // Redirect to main.html after alert
            window.location.href = 'main.html';
            
            // In a real app, you would send this to your server
            // fetch('/login', {
            //     method: 'POST',
            //     headers: {
            //         'Content-Type': 'application/json',
            //     },
            //     body: JSON.stringify({
            //         username: username,
            //         password: password
            //     }),
            // })
            // .then(response => response.json())
            // .then(data => {
            //     // Handle the response
            // });
            
            // Reset form
            this.reset();
        });
        
        // Add ripple effect to button on click
        document.querySelector('.submit-btn').addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            this.appendChild(ripple);
            
            setTimeout(() => {
                ripple.remove();
            }, 1000);
        });
    </script>
    
    <style>
        /* Ripple effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.7);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }
        
        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</body>
</html>
