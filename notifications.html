<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notifications - Twerk</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f8ff;
      color: #333;
      display: flex;
    }

    .sidebar {
      width: 250px;
      background-color: #ffffff;
      height: 100vh;
      padding: 20px;
      border-right: 1px solid #ddd;
    }

    .sidebar h2 {
      color: #1da1f2;
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      margin: 15px 0;
      color: #333;
      text-decoration: none;
      font-weight: 500;
    }

    .sidebar a:hover,
    .sidebar a.active {
      color: #1da1f2;
    }

    .content {
      flex: 1;
      padding: 40px;
    }

    .content h1 {
      font-size: 26px;
      margin-bottom: 20px;
    }

    .notification {
      background-color: #fff;
      border: 1px solid #ccc;
      border-radius: 12px;
      padding: 15px 20px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
    }

    .notification img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 15px;
    }

    .notification p {
      margin: 0;
      font-size: 15px;
      color: #444;
    }

    .notification span {
      color: #999;
      font-size: 12px;
    }
  </style>
</head>

  <div class="sidebar">
    <h2>Twerk</h2>
